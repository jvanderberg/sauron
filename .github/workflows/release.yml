name: Release

# Tag vX.Y.Z -> tests + smoke, signed/notarized/stapled DMG, GitHub Release.
#
# Required repository secrets:
#   DEVELOPER_ID_P12          base64 of the Developer ID Application .p12
#   DEVELOPER_ID_P12_PASSWORD password protecting that .p12
#   NOTARY_APPLE_ID           Apple ID email for notarization
#   NOTARY_PASSWORD           app-specific password for that Apple ID
#   NOTARY_TEAM_ID            10-char team ID (e.g. W83295YM5V)

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Tests and smoke suite
        run: make check

      - name: Import signing certificate into a throwaway keychain
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_P12 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASS="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$P12_PASSWORD" -T /usr/bin/codesign
          rm -f "$RUNNER_TEMP/cert.p12"
          security set-key-partition-list -S "apple-tool:,apple:" \
            -s -k "$KEYCHAIN_PASS" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          security default-keychain -s "$KEYCHAIN"

      - name: Build, sign, notarize, staple DMG
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
        run: VERSION="${GITHUB_REF_NAME#v}" make dist

      - name: Verify Gatekeeper acceptance
        run: |
          spctl --assess --type open --context context:primary-signature -v Sauron.dmg
          xcrun stapler validate Sauron.dmg

      - name: Create GitHub Release with the DMG
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" Sauron.dmg \
            --title "Sauron $GITHUB_REF_NAME" --generate-notes
